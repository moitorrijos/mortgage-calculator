<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style.css">
        <script src="js/script.js" defer></script>
        <title>Mortgage Calculator</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    </head> 
    <body>
       <div class="calculator-wrapper">
           <div class="calculator">
                <form id="mortgage-calculator">
                    <div class="calculator-header">
                        <h1>Mortgage Calculator</h1>
                        <button id="clear-all" class="clear-button" type="button">Clear All</button>
                    </div>
                    <label for="mortgage-amount" class="form-label full-width">Mortgage Amount
                        <div class="form-wrap reverse">
                            <span>&pound;</span>
                            <input type="number" id="mortgage-amount" name="mortgage-amount" required>
                        </div>
                    </label>
                    <label for="mortgage-term" class="form-label">Mortgage Term
                        <div class="form-wrap">
                            <input type="number" id="mortgage-term" name="mortgage-term" required>
                            <span>years</span>
                        </div>
                    </label>
                    <label for="interest-rate" class="form-label">Interest Rate
                        <div class="form-wrap">
                            <input type="number" id="interest-rate" name="interest-rate" required>
                            <span>%</span>
                        </div>
                    </label>
                    <div class="full-width mortgage-type-wrapper">
                        <p class="full-width">Mortgage Type</p>
                        <label for="mortgage-type-repayment" class="radio-input full-width"><span>Repayment</span>
                            <input type="radio" id="mortgage-type-repayment" name="mortgage-type" value="repayment" required>
                        </label>
                        <label for="mortgage-type-interest-only" class="radio-input full-width"><span>Interest Only</span>
                            <input type="radio" id="mortgage-type-interest-only" name="mortgage-type" value="interest-only" required>
                        </label>
                    </div>
                    <button type="submit" class="calculate-button">
                        <img src="assets/calculator-icon.svg" alt="" width="18" height="18">
                        Calculate Repayments
                    </button>
                </form>
                <div class="calculator-results">
                    <img src="assets/result-art.svg" alt="" width="192" height="192">
                    <h2>Results shown here</h2>
                    <p class="result-description">Complete the form and click “calculate repayments” to see what your monthly repayments would be.</p>
                </div>
           </div>
       </div> 
    </body>
</html>
